name: Release Python

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      rehearsal:
        description: "Build release artifacts without publishing to package registries"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  build-wheels:
    name: Build wheel (${{ matrix.os }} / py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          working-directory: py-tinyhgvs
          target: ${{ matrix.os == 'ubuntu-latest' && 'x86_64' || 'aarch64' }}
          args: --release --out dist --compatibility pypi -i python${{ matrix.python-version }}
          manylinux: auto

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: py-tinyhgvs/dist

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          working-directory: py-tinyhgvs
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: py-tinyhgvs/dist

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs:
      - build-wheels
      - build-sdist
    runs-on: ubuntu-latest
    environment:
      name: testpypi

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish package to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
