name: Release Rust

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      rehearsal:
        description: "Run tests and cargo publish --dry-run without uploading to crates.io"
        required: false
        type: boolean
        default: true

jobs:
  verify:
    name: Rehearse crate release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test

      - name: Run publish dry run
        run: cargo publish --dry-run -p tinyhgvs --locked

  publish:
    name: Publish crate
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish tinyhgvs to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish -p tinyhgvs --locked
